version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-console-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SESSION_SECRET=dev-secret-change-in-production
      - ALLOWED_ORIGINS=http://localhost:4200
    volumes:
      - ./backend/src/data:/app/src/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops-console-ui
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
