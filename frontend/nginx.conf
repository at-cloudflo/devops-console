# ──────────────────────────────────────────────────────────────────────────────
# Hardened nginx configuration — DevOps Console frontend
# Base image: nginxinc/nginx-unprivileged (runs as UID 101, never root)
#
# Key security decisions:
#   - server_tokens off         → hides nginx version from error pages / headers
#   - All temp paths in /tmp    → required for non-root operation
#   - /health on a plain return → no filesystem access needed for liveness probe
#   - Hidden files blocked      → prevents .env / .git leakage
#   - Strict HTTP method filter → rejects TRACE, CONNECT, etc.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes      auto;
error_log             /var/log/nginx/error.log warn;
pid                   /tmp/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Non-root temp paths ────────────────────────────────────────────────
    proxy_temp_path        /tmp/proxy_temp;
    client_body_temp_path  /tmp/client_temp;
    fastcgi_temp_path      /tmp/fastcgi_temp;
    uwsgi_temp_path        /tmp/uwsgi_temp;
    scgi_temp_path         /tmp/scgi_temp;

    # ── MIME / encoding ───────────────────────────────────────────────────
    include           /etc/nginx/mime.types;
    default_type      application/octet-stream;
    charset           utf-8;

    # ── Hardening ─────────────────────────────────────────────────────────
    server_tokens     off;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 30s;

    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/wasm image/svg+xml;

    # ── Request limits ────────────────────────────────────────────────────
    client_max_body_size     1m;
    client_header_timeout    10s;
    client_body_timeout      10s;
    send_timeout             10s;
    keepalive_requests       100;
    large_client_header_buffers 2 4k;

    # ── Logging: omit health probes to reduce noise ───────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    server {
        listen       8080;
        listen       [::]:8080;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # ── Security headers (sent on every response) ──────────────────
        add_header X-Content-Type-Options     "nosniff"                         always;
        add_header X-Frame-Options            "DENY"                            always;
        add_header X-XSS-Protection           "1; mode=block"                   always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
        # Uncomment if TLS is terminated on this container (not on a load balancer):
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Block non-standard HTTP methods ────────────────────────────
        if ($request_method !~ ^(GET|HEAD|OPTIONS|POST|PUT|PATCH|DELETE)$) {
            return 405;
        }

        # ── Liveness / readiness probe ─────────────────────────────────
        location = /health {
            access_log  off;
            add_header  Content-Type text/plain;
            return 200  "ok\n";
        }

        # ── Hashed static assets: cache 1 year, immutable ─────────────
        # Angular CLI adds content hashes to JS/CSS filenames so safe to cache forever.
        location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif|svg)$ {
            expires             1y;
            add_header          Cache-Control  "public, immutable";
            add_header          X-Content-Type-Options "nosniff" always;
            access_log          off;
        }

        # ── Angular SPA: all other routes fall back to index.html ──────
        location / {
            try_files $uri $uri/ /index.html;
            # index.html must never be cached so the browser always gets
            # the latest hashed asset filenames after a new deployment.
            add_header Cache-Control                "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options       "nosniff"                         always;
            add_header X-Frame-Options              "DENY"                            always;
            add_header X-XSS-Protection             "1; mode=block"                   always;
            add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        }

        # ── Block dot-files (.env, .git, .htaccess, etc.) ─────────────
        location ~ /\. {
            deny        all;
            access_log  off;
            log_not_found off;
        }

        # ── Deny direct access to source map files in production ───────
        location ~* \.map$ {
            deny        all;
            access_log  off;
            log_not_found off;
        }
    }
}
